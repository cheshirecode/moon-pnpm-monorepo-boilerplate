name: setup
description: "Install Node.js, pnpm, dependencies, and warm moon caches"
inputs:
  node-version:
    required: false
    description: "Node.js version to install"
    default: "24.x"
  registry-url:
    required: false
    description: "npm registry URL for setup-node"
    default: "https://registry.npmjs.org"
runs:
  using: "composite"
  steps:
    - name: Use Node.js ${{ inputs.node-version }}
      uses: actions/setup-node@v6.4.0
      with:
        node-version: ${{ inputs.node-version }}
        registry-url: ${{ inputs.registry-url }}
    - name: Enable pnpm
      shell: bash
      run: |
        corepack enable
        corepack prepare pnpm@11.9.0 --activate
    - name: Get pnpm store directory
      shell: bash
      id: pnpm-store
      run: echo "dir=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
    - name: Cache pnpm store
      uses: actions/cache@v5.0.5
      with:
        path: ${{ steps.pnpm-store.outputs.dir }}
        key: ${{ runner.os }}-${{ inputs.node-version }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-${{ inputs.node-version }}-pnpm-
    - name: Cache moon
      uses: actions/cache@v5.0.5
      with:
        path: .moon/cache
        key: ${{ runner.os }}-${{ inputs.node-version }}-moon-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-${{ inputs.node-version }}-moon-
    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
