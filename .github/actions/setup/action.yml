name: setup
description: "Install Node.js, pnpm, dependencies, and warm moon caches"
inputs:
  node-version:
    required: false
    description: "Node.js version to install"
    default: "24.x"
  registry-url:
    required: false
    description: "npm registry URL for setup-node"
    default: "https://registry.npmjs.org"
runs:
  using: "composite"
  steps:
    - name: Use Node.js ${{ inputs.node-version }}
      uses: actions/setup-node@v6.4.0
      with:
        node-version: ${{ inputs.node-version }}
        registry-url: ${{ inputs.registry-url }}
        cache: 'pnpm'
    - name: Enable pnpm
      shell: bash
      run: corepack enable
    - name: Cache moon
      uses: actions/cache@v6.1.0
      with:
        path: |
          ~/.moon/plugins
          .moon/cache
        key: ${{ runner.os }}-${{ inputs.node-version }}-moon-${{ hashFiles('.moon/**/*.yml', 'packages/*/moon.yml', 'pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-${{ inputs.node-version }}-moon-
    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
