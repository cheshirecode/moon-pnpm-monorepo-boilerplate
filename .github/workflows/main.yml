name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Lint GitHub Actions workflows
        uses: suzuki-shunsuke/actionlint-action@v0.1.4

  checks:
    needs: [workflow-lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Fast Rust lint
        run: pnpm run lint:fast
      - name: moon affected lint/typecheck/build/test
        run: pnpm moon ci :lint :typecheck :build :test
      - name: Root smoke tests
        run: pnpm exec vitest run
      - name: Verify lint did not rewrite files
        run: git diff --exit-code

  coverage:
    needs: [checks]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - app-1
          - browser-clipboard
          - eslint-config-react
          - measure-hook
          - pkce
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Coverage for ${{ matrix.package }}
        run: pnpm moon run ${{ matrix.package }}:coverage
      - name: Coveralls GitHub Action
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ github.token }}
          file: ${{ github.workspace }}/packages/${{ matrix.package }}/coverage/lcov.info
          format: lcov
          base-path: ${{ github.workspace }}/packages/${{ matrix.package }}
          flag-name: ${{ matrix.package }}
          parallel: true

  finish:
    needs: [coverage]
    if: ${{ always() && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Coveralls Finished
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ github.token }}
          parallel-finished: true
          carryforward: "app-1,browser-clipboard,eslint-config-react,measure-hook,pkce"
