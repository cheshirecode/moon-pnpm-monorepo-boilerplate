name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Lint GitHub Actions workflows
        uses: rhysd/actionlint@v1

  fast-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Run Rust-based JavaScript lint
        run: npm run lint:fast

  base:
    needs: [workflow-lint, fast-lint]
    uses: ./.github/workflows/base.yml
    with:
      build: false
      lcov: false
      storybook: false
  app-1:
    needs: [base]
    uses: ./.github/workflows/base.yml
    with:
      package-name: app-1
      storybook: true
      lcov: true
  eslint-config-react:
    needs: [base]
    uses: ./.github/workflows/base.yml
    with:
      package-name: eslint-config-react
      namespace: '@fieryeagle'
      lcov: true
  browser-clipboard:
    needs: [base]
    uses: ./.github/workflows/base.yml
    with:
      package-name: browser-clipboard
      namespace: '@fieryeagle'
      lcov: true
  measure-hook:
    needs: [base]
    uses: ./.github/workflows/base.yml
    with:
      package-name: measure-hook
      lcov: true
      build: false
  pkce:
    needs: [base]
    uses: ./.github/workflows/base.yml
    with:
      package-name: pkce
      namespace: '@fieryeagle'
      lcov: true
  finish:
    needs: [app-1,eslint-config-react,browser-clipboard,measure-hook,pkce]
    if: ${{ always() && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Coveralls Finished
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ github.token }}
          parallel-finished: true
          carryforward: "app-1,eslint-config-react,browser-clipboard,measure-hook,pkce"
