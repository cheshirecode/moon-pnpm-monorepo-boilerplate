name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Lint GitHub Actions workflows
        uses: suzuki-shunsuke/actionlint-action@v0.1.4

  checks:
    needs: [workflow-lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: CI parity checks
        run: scripts/check.sh ci
      - name: Verify lint did not rewrite files
        run: git diff --exit-code

  coverage-packages:
    needs: [workflow-lint]
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.coverage-packages.outputs.packages }}
      carryforward: ${{ steps.coverage-packages.outputs.carryforward }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Use Node.js 24.x
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.x
      - name: List coverage packages
        id: coverage-packages
        run: |
          echo "packages=$(scripts/check.sh coverage-packages json)" >> "$GITHUB_OUTPUT"
          echo "carryforward=$(scripts/check.sh coverage-packages csv)" >> "$GITHUB_OUTPUT"

  coverage:
    needs: [checks, coverage-packages]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.coverage-packages.outputs.packages) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Coverage for ${{ matrix.package }}
        run: scripts/check.sh coverage-package ${{ matrix.package }}
      - name: Coveralls GitHub Action
        uses: coverallsapp/github-action@v2.3.6
        with:
          github-token: ${{ github.token }}
          file: ${{ github.workspace }}/packages/${{ matrix.package }}/coverage/lcov.info
          format: lcov
          base-path: ${{ github.workspace }}/packages/${{ matrix.package }}
          flag-name: ${{ matrix.package }}
          parallel: true

  package-dogfood:
    needs: [checks]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Dogfood packed packages
        run: scripts/check.sh dogfood packages

  publish-check:
    needs: [checks]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Validate publishable tarballs
        run: scripts/check.sh publish-check

  changeset-check:
    needs: [workflow-lint]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Verify changeset presence
        run: scripts/check.sh changeset-check
        env:
          CHANGESET_BASE_REF: origin/main

  finish:
    needs: [coverage, coverage-packages]
    if: ${{ always() && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Coveralls Finished
        uses: coverallsapp/github-action@v2.3.6
        with:
          github-token: ${{ github.token }}
          parallel-finished: true
          carryforward: ${{ needs.coverage-packages.outputs.carryforward }}
