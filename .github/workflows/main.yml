name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Lint GitHub Actions workflows
        uses: suzuki-shunsuke/actionlint-action@v0.1.4

  static-checks:
    needs: [workflow-lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Static checks (lint-fast, package-drift, boundaries, readme-map, generator-drift)
        run: scripts/check.sh static-checks
      - name: Verify lint did not rewrite files
        run: git diff --exit-code

  lint:
    needs: [workflow-lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Lint (affected)
        run: scripts/check.sh ci-target lint
      - name: Verify lint did not rewrite files
        run: git diff --exit-code

  build:
    needs: [workflow-lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Build all packages
        run: scripts/check.sh build
      - name: Create build manifest
        run: node scripts/build-manifest.mjs create
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-dist
          path: |
            packages/*/dist
            .moon/cache
            .artifacts/build-manifest.json
          retention-days: 1

  typecheck:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-dist
      - name: Verify build manifest
        run: node scripts/build-manifest.mjs verify
      - name: Typecheck (affected)
        run: scripts/check.sh ci-target typecheck

  test:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-dist
      - name: Verify build manifest
        run: node scripts/build-manifest.mjs verify
      - name: Test (affected + root)
        run: scripts/check.sh ci-target test

  renderer-showcase:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-dist
      - name: Verify build manifest
        run: node scripts/build-manifest.mjs verify
      - name: Renderer showcase
        run: scripts/check.sh renderer-showcase --skip-build

  coverage-packages:
    needs: [workflow-lint]
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.coverage-packages.outputs.packages }}
      carryforward: ${{ steps.coverage-packages.outputs.carryforward }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Use Node.js 24.x
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.x
      - name: List coverage packages
        id: coverage-packages
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            echo "packages=$(scripts/check.sh coverage-packages json --affected)" >> "$GITHUB_OUTPUT"
          else
            echo "packages=$(scripts/check.sh coverage-packages json)" >> "$GITHUB_OUTPUT"
          fi
          echo "carryforward=$(scripts/check.sh coverage-packages csv)" >> "$GITHUB_OUTPUT"
        env:
          CHANGESET_BASE_REF: origin/main

  coverage:
    needs: [build, coverage-packages]
    runs-on: ubuntu-latest
    if: ${{ needs.coverage-packages.outputs.packages != '[]' && needs.coverage-packages.outputs.packages != '' }}
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.coverage-packages.outputs.packages) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-dist
      - name: Verify build manifest
        run: node scripts/build-manifest.mjs verify
      - name: Coverage for ${{ matrix.package }}
        run: scripts/check.sh coverage-package ${{ matrix.package }} --skip-build
      - name: Coveralls GitHub Action
        uses: coverallsapp/github-action@v2.3.6
        with:
          github-token: ${{ github.token }}
          file: ${{ github.workspace }}/packages/${{ matrix.package }}/coverage/lcov.info
          format: lcov
          base-path: ${{ github.workspace }}/packages/${{ matrix.package }}
          flag-name: ${{ matrix.package }}
          parallel: true

  package-dogfood:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-dist
      - name: Verify build manifest
        run: node scripts/build-manifest.mjs verify
      - name: Dogfood packed packages
        run: scripts/check.sh dogfood packages --skip-build

  publish-check:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-dist
      - name: Verify build manifest
        run: node scripts/build-manifest.mjs verify
      - name: Validate publishable tarballs
        run: scripts/check.sh publish-check --skip-build

  changeset-check:
    needs: [workflow-lint]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup
      - name: Verify changeset presence
        run: scripts/check.sh changeset-check
        env:
          CHANGESET_BASE_REF: origin/main

  finish:
    needs: [coverage, coverage-packages]
    if: ${{ always() && !cancelled() && needs.coverage-packages.outputs.packages != '[]' && needs.coverage-packages.outputs.packages != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Coveralls Finished
        uses: coverallsapp/github-action@v2.3.6
        with:
          github-token: ${{ github.token }}
          parallel-finished: true
          carryforward: ${{ needs.coverage-packages.outputs.carryforward }}
