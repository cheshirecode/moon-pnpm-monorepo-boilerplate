name: build snapshot

on:
  workflow_call:
    inputs:
      namespace:
        required: false
        type: string
        default: ''
      package-name:
        required: false
        type: string
      package-path:
        required: false
        type: string
        default: './packages'
      lcov:
        required: false
        type: boolean
        default: false
      storybook:
        required: false
        type: boolean
        default: false
      build:
        required: false
        type: boolean
        default: true
jobs:
  build-package:
    # Operating system to run job on
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]
    steps:
      # Get code from repo
      - name: Checkout code
        uses: actions/checkout@v3
      # setup
      - uses: ./.github/actions/setup
      # Run rush install
      - name: Install dependencies
        run: |
          node common/scripts/install-run-rush.js change -v
          node common/scripts/install-run-rush.js install
      - name: Resolve Rush project
        if: inputs.package-name != ''
        id: rush-project
        shell: bash
        run: |
          project="${{ inputs.package-name }}"
          if [ -n "${{ inputs.namespace }}" ]; then
            project="${{ inputs.namespace }}/${project}"
          fi
          echo "name=${project}" >> "$GITHUB_OUTPUT"
      # Run lint for this package
      - name: lint ${{ inputs.package-name }}
        if: inputs.package-name != ''
        run: node common/scripts/install-run-rush.js lint --to "${{ steps.rush-project.outputs.name }}"
      # Run unit tests for this package
      - name: build dependency chain for ${{ inputs.package-name }}
        if: inputs.package-name != '' && inputs.build
        run: node common/scripts/install-run-rush.js build --to "${{ steps.rush-project.outputs.name }}"
      - name: test ${{ inputs.package-name }}
        if: inputs.package-name != '' && !inputs.lcov
        run: node common/scripts/install-run-rush.js test --to "${{ steps.rush-project.outputs.name }}"
      - name: test:lcov ${{ inputs.package-name }}
        if: inputs.package-name != '' && inputs.lcov
        working-directory: ${{ inputs.package-path }}/${{ inputs.package-name }}
        run: |
          pwd
          node $GITHUB_WORKSPACE/common/scripts/install-run-rushx.js coverage
      - name: Coveralls GitHub Action
        if: inputs.lcov != ''
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.github_token }}
          file: ${{ github.workspace }}/${{ inputs.package-path }}/${{ inputs.package-name }}/coverage/lcov.info
          format: lcov
          flag-name: ${{ inputs.package-name }}
          parallel: true
      - name: build ${{ inputs.package-name }}
        if: inputs.package-name != '' && inputs.build
        working-directory: ${{ inputs.package-path }}/${{ inputs.package-name }}
        run: |
          pwd
          node $GITHUB_WORKSPACE/common/scripts/install-run-rushx.js build
