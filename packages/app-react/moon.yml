language: "typescript"
layer: "application"
stack: "frontend"
tags:
  - "react"
  - "vite"
  - "hono"
  - "ssr"

tasks:
  build:
    outputs:
      - "dist/client/**/*"
      - "dist/server/**/*"
  dev:
    command: "node dev.ts"
    options:
      cache: false
      runInCI: false
      persistent: true
    inputs:
      - "src/**/*"
      - "*.config.*"
      - "index.html"
